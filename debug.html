<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug Grid Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container" style="border: 5px solid red;">
        <header class="app-header" style="background: yellow;">HEADER</header>
        <aside class="sidebar" style="background: lightblue;">LEFT SIDEBAR</aside>
        <main class="canvas-area" style="background: lightgray;">CANVAS</main>
        <aside class="sidebar right" style="background: lightgreen;">
            <div>RIGHT SIDEBAR - PROPERTIES SHOULD BE HERE</div>
            <div id="inspector-content" class="properties-content">
                <div style="background: pink; padding: 20px;">PROPERTIES CONTENT</div>
            </div>
        </aside>
    </div>
</body>
</html>
