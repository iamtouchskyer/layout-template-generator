name: SmartArt Sync

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smartart-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run SmartArt pipeline tests
        run: make test

      - name: Browser smoke test (SmartArt)
        run: make test:e2e

      - name: Ensure bundle and generated files are committed
        run: git diff --exit-code -- js/smartart.bundle.js js/config.smartart.generated.js js/smartart/types/registry.generated.js pptx_gen/smartart_map_generated.py
