<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout × Theme Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css?v=10">
    <link rel="stylesheet" href="styles/editor.css?v=16">
    <link rel="stylesheet" href="styles/preview.css?v=9">
    <link rel="stylesheet" href="styles/slide.css?v=17">
    <link rel="stylesheet" href="styles/cards.css?v=9">
    <link rel="stylesheet" href="styles/layouts.css?v=9">
    <link rel="stylesheet" href="styles/sections.css?v=11">
</head>
<body>
    <header class="app-header">
        <div class="app-logo">Layout × Theme</div>
        <div class="header-actions">
            <button class="btn" onclick="exportConfig()">Export JSON</button>
            <button class="btn btn-primary" onclick="generatePPTX()">Generate PPTX</button>
        </div>
    </header>

    <div class="main-content">
        <div class="editor-panel">
            <!-- L1 Editor -->
            <div class="editor-section-group" id="editor-l1">
                <div class="section-group-header" onclick="toggleSection('l1')">
                    <span class="layer-badge">L1</span>
                    <div class="section-group-title">
                        <h3>Theme & Master</h3>
                        <span class="section-group-value" id="nav-l1-value">Forest Green + 0 shapes</span>
                    </div>
                    <span class="section-toggle" id="toggle-l1">▶</span>
                </div>
                <div class="section-group-content collapsed" id="content-l1">
                    <div class="editor-section">
                        <div class="editor-section-title">Theme (.thmx)</div>
                        <div class="control-group"><label>Color & Font Scheme</label>
                            <select id="theme-select" onchange="updateState()">
                                <optgroup label="基础主题">
                                    <option value="soft_peach_cream">Soft Peach Cream</option>
                                    <option value="executive">Executive (Dark)</option>
                                    <option value="forest_green">Forest Green</option>
                                    <option value="sunset_orange">Sunset Orange</option>
                                    <option value="cosmic">Cosmic (Dark)</option>
                                    <option value="azure">Azure Blue</option>
                                </optgroup>
                                <optgroup label="柔和配色">
                                    <option value="clear_sky_wheat">晴空麦田</option>
                                    <option value="cloud_ink_shadow">云墨影</option>
                                    <option value="cloud_letter">云笺</option>
                                    <option value="moss_green">苔藓绿</option>
                                    <option value="rose_wine">玫瑰酒红</option>
                                    <option value="sakura_muffin">樱花马芬</option>
                                    <option value="white_tea_joy">白茶悦</option>
                                </optgroup>
                                <optgroup label="高端汇报">
                                    <option value="bright_red_blue">亮红蓝配色</option>
                                    <option value="bright_blue_red">亮蓝红配色</option>
                                    <option value="deep_red_blue">深红蓝配色</option>
                                    <option value="deep_green_gold">深绿金配色</option>
                                    <option value="deep_blue_gold">深蓝金配色</option>
                                    <option value="blue_green_gold">蓝绿金配色</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="control-group"><label>Aspect Ratio</label>
                            <select id="aspect-ratio-select" onchange="updateAspectRatio(this.value)">
                            </select>
                        </div>
                    </div>
                    <div class="editor-section"><div class="editor-section-title">Decorative Shapes</div><div class="checkbox-group" id="shapes-list"></div></div>
                    <div class="editor-section">
                        <div class="editor-section-title">Placeholders</div>
                        <div class="placeholder-list" id="placeholder-list"></div>
                    </div>
                    <div class="editor-section">
                        <div class="editor-section-title">Content Areas</div>
                        <div class="content-areas-config" id="content-areas-config"></div>
                    </div>
                </div>
            </div>
            <!-- L2 Editor -->
            <div class="editor-section-group" id="editor-l2">
                <div class="section-group-header" onclick="toggleSection('l2')">
                    <span class="layer-badge">L2</span>
                    <div class="section-group-title">
                        <h3>Page Type</h3>
                        <span class="section-group-value" id="nav-l2-value">Content-Grid</span>
                    </div>
                    <span class="section-toggle" id="toggle-l2">▼</span>
                </div>
                <div class="section-group-content" id="content-l2">
                    <div class="editor-section">
                        <div class="editor-section-title">页面类型</div>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="radio" name="page-type" value="cover" onchange="updatePageType(this.value)"><span class="item-label">封面</span><span class="item-desc">Cover</span></label>
                            <label class="checkbox-item"><input type="radio" name="page-type" value="divider" onchange="updatePageType(this.value)"><span class="item-label">目录/章节</span><span class="item-desc">Divider</span></label>
                            <label class="checkbox-item"><input type="radio" name="page-type" value="content-grid" checked onchange="updatePageType(this.value)"><span class="item-label">内容-Grid</span><span class="item-desc">卡片/图表布局</span></label>
                            <label class="checkbox-item"><input type="radio" name="page-type" value="content-smartart" onchange="updatePageType(this.value)"><span class="item-label">内容-SmartArt</span><span class="item-desc">关系图形</span></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3>Preview</h3>
                <div class="preview-controls">
                    <div class="zoom-control"><label>Zoom</label><input type="range" id="zoom-slider" min="75" max="200" value="100" oninput="setZoom(this.value)"><span class="zoom-value" id="zoom-value">100%</span></div>
                    <div class="preview-tabs"><button class="preview-tab active" onclick="setPreviewTab('preview')">Preview</button><button class="preview-tab" onclick="setPreviewTab('json')">JSON</button></div>
                </div>
            </div>
            <!-- Cover Operation Bar (visible only for cover) -->
            <div class="cover-operation-bar" id="cover-operation-bar">
                <div class="grid-op-row">
                    <div class="grid-op-section">
                        <div class="grid-op-title">封面布局</div>
                        <div class="cover-layout-selector" id="cover-layout-selector"></div>
                    </div>
                </div>
            </div>
            <!-- Divider Operation Bar (visible only for divider) -->
            <div class="divider-operation-bar" id="divider-operation-bar">
                <div class="grid-op-row">
                    <div class="grid-op-section">
                        <div class="grid-op-title">布局样式</div>
                        <div class="divider-style-selector" id="divider-style-selector"></div>
                    </div>
                    <div class="grid-op-section">
                        <div class="grid-op-title">章节数量</div>
                        <div class="divider-count-selector" id="divider-count-selector"></div>
                    </div>
                    <div class="grid-op-section">
                        <div class="grid-op-title">编号样式</div>
                        <div class="divider-number-selector" id="divider-number-selector"></div>
                    </div>
                    <div class="grid-op-section">
                        <div class="grid-op-title">文字层级</div>
                        <div class="divider-text-selector" id="divider-text-selector"></div>
                    </div>
                    <div class="grid-op-section">
                        <div class="grid-op-title">背景样式</div>
                        <div class="divider-bg-selector" id="divider-bg-selector"></div>
                    </div>
                    <div class="grid-op-section">
                        <div class="grid-op-title">当前章节</div>
                        <div class="divider-index-selector" id="divider-index-selector"></div>
                    </div>
                </div>
            </div>
            <!-- Grid Operation Bar (visible only for content-grid) -->
            <div class="grid-operation-bar" id="grid-operation-bar">
                <div class="grid-op-row">
                    <div class="grid-op-section">
                        <div class="grid-op-title">布局模式</div>
                        <div class="layout-patterns" id="layout-patterns"></div>
                    </div>
                </div>
                <div class="grid-op-row">
                    <div class="grid-op-section">
                        <div class="grid-op-title">区域内容</div>
                        <div class="zone-assignments" id="zone-assignments"></div>
                    </div>
                </div>
            </div>
            <!-- SmartArt Operation Bar (visible only for content-smartart) -->
            <div class="smartart-operation-bar" id="smartart-operation-bar">
                <div class="smartart-op-row">
                    <div class="smartart-op-group">
                        <span class="smartart-op-label">类型</span>
                        <div class="smartart-type-selector" id="smartart-type-selector"></div>
                    </div>
                    <div class="smartart-op-divider"></div>
                    <div class="smartart-op-group">
                        <span class="smartart-op-label">数量</span>
                        <div class="smartart-count-selector" id="smartart-count-selector"></div>
                    </div>
                    <div class="smartart-op-divider"></div>
                    <div class="smartart-op-group">
                        <span class="smartart-op-label">布局</span>
                        <div class="smartart-placements" id="smartart-placements"></div>
                    </div>
                    <div class="smartart-op-divider"></div>
                    <div class="smartart-op-group">
                        <span class="smartart-op-label">配色</span>
                        <div class="smartart-colors" id="smartart-colors"></div>
                    </div>
                </div>
            </div>
            <div class="preview-viewport" id="preview-viewport">
                <!-- SmartArt Text Editor (outside slide, PPT-style) -->
                <div class="smartart-text-editor" id="smartart-text-editor"></div>
                <div class="slide-wrapper">
                    <div class="slide-container" id="slide"><div class="master-layer" id="master-layer"></div><div class="content-layer" id="content-layer"></div></div>
                </div>
            </div>
            <div class="code-view" id="code-view"><pre id="json-output"></pre></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/smartart.bundle.js?v=20260206c"></script>
    <script src="themes.js?v=2"></script>
    <script src="js/config-loader.js?v=14"></script>
    <script src="js/config.smartart.generated.js?v=1"></script>
    <script src="js/config.js?v=14"></script>
    <script src="js/state.js?v=15"></script>

    <!-- Render modules (load first - no dependencies) -->
    <script src="js/render/charts.js"></script>
    <script src="js/render/placeholders.js"></script>
    <script src="js/render/shapes.js"></script>
    <script src="js/render/master.js"></script>
    <script src="js/render/cover.js"></script>
    <script src="js/render/divider.js"></script>
    <script src="js/render/zones.js"></script>
    <script src="js/render/smartart.js"></script>
    <script src="js/render/core.js"></script>

    <!-- UI modules (depend on render modules) -->
    <script src="js/ui/controls.js"></script>
    <script src="js/ui/placeholders.js"></script>
    <script src="js/ui/shapes.js"></script>
    <script src="js/ui/page-types.js"></script>
    <script src="js/ui/grid.js"></script>
    <script src="js/ui/divider.js"></script>
    <script src="js/ui/smartart.js"></script>
    <script src="js/ui/export.js"></script>

    <!-- Legacy modules (to be migrated) -->
    <script src="js/render-layouts.js?v=9"></script>
    <script src="js/render-cards.js?v=9"></script>

    <!-- App entry point -->
    <script src="js/main.js?v=9"></script>
</body>
</html>
